<!DOCTYPE html>
<html lang="ka" dir="ltr" data-lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Chancellery — კორპორატიული კორესპონდენციის მართვა</title>
<meta name="description" content="AI Chancellery კითხულობს შემოსულ კორესპონდენციას, აანალიზებს, ანაწილებს და პასუხის პირველ ვარიანტს ამზადებს თქვენივე კორპორატიული სტილით. ელ-ხელმოწერა, ბეჭედი და ძებნადი არქივი." />
<meta property="og:title" content="AI Chancellery — კორესპონდენციის მართვა" />
<meta property="og:description" content="შემოსული წერილიდან მზა, ხელმოწერილ პასუხამდე." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Georgian:wght@500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F3EB;--paper-2:#FFFDF8;--card:#FFFFFF;
    --ink:#1C1B15;--ink-2:#46433A;--muted:#736F62;--muted-2:#A19B8A;
    --line:#E5E1D4;--line-2:#D6D0BF;
    --brand:#1F5F49;--brand-2:#164A38;--brand-soft:#E5EDE7;--brand-tint:#EEF4EF;--brand-line:#CADbd0;
    --gold:#AE843A;--gold-2:#916C2C;--gold-soft:#F1E7CF;--gold-line:#E4D3A6;
    --urgent:#BE4A2E;--ok:#2F8659;
    --green-dark:#123A2C;
    --shadow:0 26px 60px -30px rgba(40,36,20,.35);
    --shadow-sm:0 14px 40px -24px rgba(40,36,20,.3);
    --radius:16px;--maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  [id]{scroll-margin-top:92px}
  h1,h2,h3,p,.lead{overflow-wrap:break-word}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  body{font-family:"Noto Sans Georgian",system-ui,sans-serif;background:var(--paper);color:var(--ink-2);line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  html[data-lang="en"] body{font-family:"Inter","Noto Sans Georgian",system-ui,sans-serif}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(760px 480px at 84% -8%, rgba(174,132,58,.10), transparent 60%),
    radial-gradient(680px 460px at -4% 6%, rgba(31,95,73,.07), transparent 58%)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  section{position:relative;z-index:1}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--brand);color:#fff}

  h1,h2,h3{font-family:"Noto Serif Georgian",serif;color:var(--ink);font-weight:700;letter-spacing:-.015em;line-height:1.12;text-wrap:balance}
  html[data-lang="en"] h1,html[data-lang="en"] h2,html[data-lang="en"] h3{font-family:"Inter",sans-serif}
  h2{font-size:clamp(1.7rem,3.2vw,2.5rem)}
  .eyebrow{font-family:"DM Mono",monospace;font-size:.73rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;
    color:var(--brand);display:inline-flex;align-items:center;gap:.6em}
  .eyebrow::before{content:"";width:18px;height:2px;background:var(--gold);border-radius:2px}
  .mono{font-family:"DM Mono",monospace}
  .lead{color:var(--muted);font-size:clamp(1rem,1.4vw,1.12rem)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-weight:600;font-size:.95rem;
    padding:.82em 1.45em;border-radius:11px;border:1px solid transparent;cursor:pointer;line-height:1.15;
    transition:transform .18s, box-shadow .25s, background .2s, border-color .2s;white-space:nowrap;font-family:inherit}
  .btn:focus-visible{outline:2px solid var(--brand);outline-offset:3px}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:0 10px 26px -12px rgba(31,95,73,.55)}
  .btn-primary:hover{background:var(--brand-2);transform:translateY(-2px);box-shadow:0 16px 32px -12px rgba(31,95,73,.6)}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-2)}
  .btn-ghost:hover{border-color:var(--ink);transform:translateY(-2px)}
  .btn-lg{padding:.98em 1.8em;font-size:1rem}
  .btn svg{width:17px;height:17px}

  /* nav */
  header.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(245,243,235,.8);
    border-bottom:1px solid transparent;transition:border-color .3s, background .3s}
  header.nav.scrolled{border-bottom-color:var(--line);background:rgba(245,243,235,.92)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;gap:16px}
  .brand{display:flex;align-items:center;gap:11px;font-family:"Noto Serif Georgian",serif;font-weight:700;font-size:1.1rem;color:var(--ink)}
  html[data-lang="en"] .brand{font-family:"Inter",sans-serif}
  .brand .logo{width:34px;height:34px;flex:none}
  .nav-links{display:flex;align-items:center;gap:26px}
  .nav-links a{color:var(--muted);font-size:.94rem;font-weight:500;transition:color .18s}
  .nav-links a:hover{color:var(--ink)}
  .nav-cta{display:flex;align-items:center;gap:11px}
  .lang-tog{display:flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;flex:none;background:var(--card)}
  .lang-btn{background:none;border:none;color:var(--muted);font-family:"DM Mono",monospace;font-size:.72rem;font-weight:500;
    letter-spacing:.04em;padding:.56em .72em;cursor:pointer;transition:all .18s}
  .lang-btn.active{background:var(--brand);color:#fff}
  .lang-btn:hover:not(.active){color:var(--ink)}
  .lang-btn:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  .hamburger{display:none;background:var(--card);border:1px solid var(--line-2);border-radius:10px;width:42px;height:42px;cursor:pointer;align-items:center;justify-content:center}
  .hamburger svg{width:20px;height:20px;stroke:var(--ink)}
  .mobile-menu{display:none;border-top:1px solid var(--line);background:rgba(255,253,248,.98)}
  .mobile-menu a{display:block;padding:14px 24px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--line)}
  .mobile-menu a:hover{color:var(--ink);background:var(--paper)}
  .mobile-menu.open{display:block}

  /* hero */
  .hero{padding:clamp(44px,7vw,80px) 0 clamp(54px,8vw,90px)}
  .hero-grid{display:grid;grid-template-columns:1.02fr 1fr;gap:clamp(36px,5vw,60px);align-items:start}
  .hero .eyebrow{line-height:1}
  .hero h1{font-size:clamp(2.15rem,4.6vw,3.4rem);margin:20px 0 0}
  .hero h1 .hl{color:var(--brand)}
  .hero p.lead{margin:20px 0 0;max-width:33em}
  .hero-cta{display:flex;gap:13px;margin-top:30px;flex-wrap:wrap}
  .hero-trust{display:flex;gap:12px 22px;margin-top:28px;flex-wrap:wrap;align-items:center}
  .hero-trust .ht{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.88rem}
  .hero-trust .ht svg{width:16px;height:16px;stroke:var(--brand);flex:none}

  /* ---- signature: correspondence lifecycle ---- */
  .flow{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:relative}
  .flow-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper-2)}
  .flow-head .rg{font-family:"DM Mono",monospace;font-size:.68rem;color:var(--muted);letter-spacing:.03em}
  .flow-head .ttl{font-family:"Noto Serif Georgian",serif;font-weight:700;font-size:.94rem;color:var(--ink)}
  html[data-lang="en"] .flow-head .ttl{font-family:"Inter",sans-serif}
  .flow-head .st{margin-left:auto;font-family:"DM Mono",monospace;font-size:.63rem;text-transform:uppercase;letter-spacing:.07em;
    color:var(--brand);background:var(--brand-soft);padding:.32em .6em;border-radius:5px;font-weight:500}
  .flow-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}

  .letter{border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;background:var(--paper-2)}
  .letter .lt{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted);margin-bottom:5px}
  .letter .lt svg{width:14px;height:14px;stroke:var(--muted);flex:none}
  .letter .lt .ch{margin-left:auto;font-family:"DM Mono",monospace;font-size:.62rem;color:var(--muted-2)}
  .letter .ls{font-weight:600;color:var(--ink);font-size:.89rem}
  .letter .lb{font-size:.81rem;color:var(--muted);margin-top:4px}

  .anz{display:flex;flex-direction:column;gap:9px}
  .anz .lbl{font-family:"DM Mono",monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2)}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tag{font-size:.75rem;padding:.34em .6em;border-radius:7px;border:1px solid var(--line);background:var(--paper);color:var(--ink-2);
    display:inline-flex;align-items:center;gap:6px;opacity:0;transform:translateY(5px);transition:all .4s ease}
  .tag.show{opacity:1;transform:none}
  .tag .k{color:var(--muted-2);font-family:"DM Mono",monospace;font-size:.62rem}
  .tag.urgent{border-color:var(--gold-line);background:#fbf4e6}.tag.urgent b{color:var(--urgent)}
  .tag b{font-weight:600}

  .route{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;background:var(--brand-tint);
    border:1px solid var(--brand-line);font-size:.81rem;color:var(--ink);opacity:0;transform:translateX(-6px);transition:all .45s ease}
  .route.show{opacity:1;transform:none}
  .route svg{width:16px;height:16px;stroke:var(--brand);flex:none}
  .route b{font-weight:600}.route .who{margin-left:auto;font-family:"DM Mono",monospace;font-size:.7rem;color:var(--muted)}

  .draft{border:1px dashed var(--line-2);border-radius:10px;padding:12px 14px;background:var(--paper-2)}
  .draft .dh{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
  .draft .ai{font-family:"DM Mono",monospace;font-size:.6rem;font-weight:500;letter-spacing:.06em;color:var(--brand);
    background:var(--brand-soft);padding:.24em .5em;border-radius:5px}
  .draft .dh span{font-size:.77rem;color:var(--muted)}
  .dline{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--line-2),var(--line));margin:7px 0;
    opacity:0;transform:translateY(4px);transition:all .4s ease}
  .dline.show{opacity:1;transform:none}
  .dline.w1{width:96%}.dline.w2{width:88%}.dline.w3{width:62%}

  .signrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-top:6px;border-top:1px solid var(--line);margin-top:2px}
  .sign-wrap{position:relative;flex:1}
  .sign-wrap .cap{font-family:"DM Mono",monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-2);margin-bottom:2px}
  .sign{width:150px;height:44px;display:block}
  .sig-path{fill:none;stroke:var(--ink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .seal{width:78px;height:78px;flex:none;opacity:0;transform-box:view-box;transform-origin:center}
  .seal.stamped{animation:stamp .6s cubic-bezier(.2,.8,.3,1) forwards}
  @keyframes stamp{0%{transform:scale(2.1) rotate(-15deg);opacity:0}55%{transform:scale(.92) rotate(-8deg);opacity:.95}100%{transform:scale(1) rotate(-9deg);opacity:.9}}
  .seal .ring{fill:none;stroke:var(--gold);stroke-width:1.4}
  .seal .ring2{fill:none;stroke:var(--gold);stroke-width:.7;opacity:.7}
  .seal .stxt{font-family:"DM Mono",monospace;font-size:6.4px;fill:var(--gold-2);letter-spacing:.5px}
  .seal .emb{fill:none;stroke:var(--gold);stroke-width:1.5;stroke-linecap:round}
  .seal .yr{font-family:"DM Mono",monospace;font-size:7px;fill:var(--gold-2);text-anchor:middle;font-weight:500}

  .archived{display:flex;align-items:center;gap:8px;font-size:.77rem;color:var(--ok);opacity:0;transform:translateY(4px);transition:all .4s ease}
  .archived.show{opacity:1;transform:none}
  .archived svg{width:15px;height:15px;stroke:var(--ok);flex:none}
  .archived .rn{margin-left:auto;font-family:"DM Mono",monospace;font-size:.7rem;color:var(--muted)}

  /* stat band */
  .stats{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--paper-2)}
  .stats .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;padding:40px 24px}
  .stat .n{font-family:"Noto Serif Georgian",serif;font-weight:700;font-size:clamp(1.55rem,2.6vw,2.1rem);line-height:1.05;color:var(--brand)}
  html[data-lang="en"] .stat .n{font-family:"Inter",sans-serif}
  .stat .l{color:var(--muted);font-size:.88rem;margin-top:10px}
  .stat:not(:last-child){border-right:1px solid var(--line);padding-right:28px}

  /* sections */
  .sec{padding:clamp(66px,9vw,116px) 0}
  .sec-head{max-width:680px;margin-bottom:clamp(38px,5vw,56px)}
  .sec-head h2{margin-top:16px}.sec-head p{margin-top:16px}

  /* how */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .step{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px 24px 30px;transition:transform .22s, box-shadow .22s, border-color .22s}
  .step:hover{transform:translateY(-4px);box-shadow:var(--shadow-sm);border-color:var(--line-2)}
  .step .num{font-family:"DM Mono",monospace;font-size:.78rem;font-weight:500;color:var(--gold-2);
    border:1px solid var(--gold-line);background:var(--gold-soft);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
  .step .si{margin:18px 0 14px}.step .si svg{width:26px;height:26px;stroke:var(--brand);stroke-width:1.6}
  .step h3{font-size:1.06rem;font-weight:700}.step p{color:var(--muted);font-size:.89rem;margin-top:8px}

  /* features */
  .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .feat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px;transition:transform .22s, box-shadow .22s, border-color .22s}
  .feat:hover{transform:translateY(-4px);box-shadow:var(--shadow-sm);border-color:var(--line-2)}
  .feat .fi{width:48px;height:48px;border-radius:12px;background:var(--brand-tint);border:1px solid var(--brand-line);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .feat .fi svg{width:24px;height:24px;stroke:var(--brand);stroke-width:1.6}
  .feat h3{font-size:1.14rem;font-weight:700}.feat p{color:var(--muted);font-size:.92rem;margin-top:10px}

  /* adapt band */
  .adapt{background:var(--green-dark);color:#cfe0d6;border-radius:24px;padding:clamp(36px,5vw,60px);position:relative;overflow:hidden}
  .adapt::before{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(174,132,58,.28),transparent 70%)}
  .adapt-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,4vw,56px);align-items:center;position:relative}
  .adapt .eyebrow{color:#d9b76e}.adapt .eyebrow::before{background:#d9b76e}
  .adapt h2{color:#fff;margin-top:16px}.adapt .lead{color:#9fb6a9;margin-top:16px}
  .adapt-list{display:flex;flex-direction:column;gap:14px}
  .al{display:flex;gap:14px;align-items:flex-start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 17px}
  .al .ac{width:30px;height:30px;border-radius:8px;background:rgba(174,132,58,.2);display:flex;align-items:center;justify-content:center;flex:none}
  .al .ac svg{width:16px;height:16px;stroke:#d9b76e;stroke-width:1.9}
  .al b{color:#fff;font-weight:600;font-size:.95rem}.al p{color:#8ea89a;font-size:.85rem;margin-top:3px}

  /* security */
  .sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,5vw,60px);align-items:center}
  .trust-list{display:flex;flex-direction:column;gap:16px;margin-top:28px}
  .ti{display:flex;gap:14px;align-items:flex-start}
  .ti .c{width:28px;height:28px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--brand-tint);border:1px solid var(--brand-line)}
  .ti .c svg{width:15px;height:15px;stroke:var(--brand)}
  .ti b{font-weight:600;color:var(--ink)}.ti p{color:var(--muted);font-size:.89rem;margin-top:2px}
  .audit{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .audit .ah{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--line);background:var(--paper-2);
    font-family:"DM Mono",monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .audit .ah svg{width:15px;height:15px;stroke:var(--brand);flex:none}
  .audit .arow2{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid var(--line);font-size:.79rem}
  .audit .arow2:first-of-type{border-top:none}
  .audit .arow2 .u{width:26px;height:26px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;flex:none}
  .audit .arow2 .act b{color:var(--ink);font-weight:600}.audit .arow2 .act span{color:var(--muted)}
  .audit .arow2 .tm{margin-left:auto;font-family:"DM Mono",monospace;font-size:.66rem;color:var(--muted-2)}

  /* faq */
  .faq{max-width:820px;margin:0 auto}
  .faq details{border:1px solid var(--line);border-radius:13px;background:var(--card);margin-bottom:12px;overflow:hidden}
  .faq details[open]{border-color:var(--line-2);box-shadow:var(--shadow-sm)}
  .faq summary{padding:19px 24px;cursor:pointer;font-family:"Noto Serif Georgian",serif;font-weight:700;color:var(--ink);font-size:1.02rem;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:16px;line-height:1.4}
  html[data-lang="en"] .faq summary{font-family:"Inter",sans-serif}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary .pl{flex:none;width:20px;height:20px;position:relative}
  .faq summary .pl::before,.faq summary .pl::after{content:"";position:absolute;inset:0;margin:auto;background:var(--gold);border-radius:2px}
  .faq summary .pl::before{width:13px;height:2px}.faq summary .pl::after{width:2px;height:13px;transition:transform .25s}
  .faq details[open] summary .pl::after{transform:scaleY(0)}
  .faq .a{padding:0 24px 22px;color:var(--muted);font-size:.94rem;max-width:64ch;line-height:1.66}

  /* contact */
  .cta{padding:clamp(20px,4vw,40px) 0 clamp(70px,9vw,110px)}
  .cta-card{border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;background:var(--card)}
  .cta-left{padding:clamp(34px,4vw,56px);background:linear-gradient(150deg,var(--brand-tint),var(--card) 60%)}
  .cta-left h2{font-size:clamp(1.6rem,2.8vw,2.2rem)}
  .cta-left p{color:var(--muted);margin-top:16px;max-width:30em}
  .cta-pts{display:flex;flex-direction:column;gap:12px;margin-top:26px}
  .cta-pts .p{display:flex;gap:11px;align-items:center;font-size:.9rem;color:var(--ink)}
  .cta-pts .p svg{width:18px;height:18px;stroke:var(--brand);flex:none}
  .cta-right{padding:clamp(34px,4vw,52px)}
  .frow2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:7px}
  .field label .req{color:var(--urgent)}
  .field input,.field textarea{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);font-family:inherit;font-size:.93rem;transition:border-color .18s, box-shadow .18s}
  .field textarea{resize:vertical;min-height:82px}
  .field input::placeholder,.field textarea::placeholder{color:var(--muted-2)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,95,73,.13)}
  .field.err input{border-color:var(--urgent)}
  .field .me{color:var(--urgent);font-size:.76rem;margin-top:5px;display:none}.field.err .me{display:block}
  .cta-right .btn-primary{width:100%;margin-top:6px}
  .fnote{color:var(--muted-2);font-size:.77rem;text-align:center;margin-top:13px}
  .ferr{display:none;color:var(--urgent);font-size:.84rem;text-align:center;margin-top:12px;background:#faeee9;border:1px solid #e8c9bd;border-radius:10px;padding:10px}
  .ferr.show{display:block}
  .csuccess{display:none;text-align:center;padding:24px 6px}.csuccess.show{display:block;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .csuccess .ok{width:64px;height:64px;border-radius:50%;background:var(--brand-soft);border:1px solid var(--brand-line);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .csuccess .ok svg{width:30px;height:30px;stroke:var(--brand)}
  .csuccess h3{font-size:1.35rem;margin-bottom:8px}.csuccess p{color:var(--muted);max-width:28em;margin:0 auto}

  /* footer */
  footer{border-top:1px solid var(--line);padding:54px 0 38px;position:relative;z-index:1;background:var(--paper-2)}
  .foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:30px}
  .foot-brand p{color:var(--muted);font-size:.89rem;margin-top:14px;max-width:32ch}
  .foot-col h4{font-family:"DM Mono",monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:14px}
  .foot-col a{display:block;color:var(--muted);font-size:.91rem;padding:5px 0;transition:color .18s}.foot-col a:hover{color:var(--ink)}
  .foot-bot{display:flex;justify-content:space-between;align-items:center;margin-top:44px;padding-top:22px;border-top:1px solid var(--line);color:var(--muted-2);font-size:.83rem;flex-wrap:wrap;gap:10px}

  .reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease, transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

  /*
    FIX: grid/flex "blowout" — grid & flex items default to min-width:auto,
    which lets long unbreakable content (nowrap buttons, default input sizing,
    auto-margin rows) force a column wider than its track. On narrow viewports
    this pushed the hero animation card and the contact-form card past the
    screen edge (clipped by body{overflow-x:hidden} instead of wrapping).
    Setting min-width:0 on these items lets them shrink to their track and
    wrap normally.
  */
  .hero-grid>*,.cta-card>*{min-width:0}
  .cta-right *{min-width:0}

  @media (max-width:960px){
    .nav-links{display:none}.hamburger{display:flex}.nav-cta .btn-ghost{display:none}
    .hero-grid{grid-template-columns:1fr;gap:40px}.flow{max-width:560px}
    .stats .wrap{grid-template-columns:1fr 1fr;gap:26px}.stat:nth-child(2){border-right:none;padding-right:0}
    .steps{grid-template-columns:1fr 1fr}
    .feat-grid{grid-template-columns:1fr 1fr}
    .adapt-grid,.sec-grid{grid-template-columns:1fr;gap:32px}
    .cta-card{grid-template-columns:1fr}

    .cta-right{

    }
  }

  @media (max-width:600px){
    .wrap{padding:0 18px}.nav-cta .btn-primary{display:none}.brand{font-size:1rem}.brand .logo{width:30px;height:30px}
    .stats .wrap{grid-template-columns:1fr 1fr;gap:22px}

    .frow2{grid-template-columns:1fr}.foot-grid{grid-template-columns:1fr 1fr}
    .lang-tog .lang-btn{padding:.5em .6em}

    /* hero animation card: let the flex rows wrap instead of overflowing */

    .flow-head{flex-wrap:wrap;row-gap:6px}

  }
</style>

var CUR_LANG='ka';

function applyLang(lang){
  if(!I18N[lang]) return;
  CUR_LANG=lang;
  var d=I18N[lang];
  document.documentElement.setAttribute('lang',lang);
  document.documentElement.setAttribute('data-lang',lang);
  document.querySelectorAll('[data-i]').forEach(function(el){ var k=el.getAttribute('data-i'); if(d[k]!=null) el.textContent=d[k]; });
  document.querySelectorAll('[data-i-html]').forEach(function(el){ var k=el.getAttribute('data-i-html'); if(d[k]!=null) el.innerHTML=d[k]; });
  document.querySelectorAll('[data-ph]').forEach(function(el){ var k=el.getAttribute('data-ph'); if(d[k]!=null) el.setAttribute('placeholder',d[k]); });
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.lang===lang); });
  if(d['meta.title']) document.title=d['meta.title'];
  var st=document.getElementById('flowSt'); if(st && st.dataset.state){ st.textContent=d['flow.st.'+st.dataset.state]; }
}
document.querySelectorAll('.lang-btn').forEach(function(b){ b.addEventListener('click', function(){ applyLang(b.dataset.lang); }); });

/* nav */
var nav=document.getElementById('nav');
window.addEventListener('scroll',function(){ if(window.scrollY>12) nav.classList.add('scrolled'); else nav.classList.remove('scrolled'); });
var burger=document.getElementById('burger'), menu=document.getElementById('mobileMenu');
burger.addEventListener('click',function(){ var o=menu.classList.toggle('open'); burger.setAttribute('aria-expanded',o?'true':'false'); });
menu.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',function(){ menu.classList.remove('open'); burger.setAttribute('aria-expanded','false'); }); });

/* reveal */
if('IntersectionObserver' in window && !reduce){
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
} else { document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');}); }

/* lifecycle animation */
(function(){
  var tags=document.querySelectorAll('.tag');
  var route=document.getElementById('route');
  var dlines=document.querySelectorAll('.dline');
  var seal=document.getElementById('seal');
  var sig=document.getElementById('sigPath');
  var arch=document.getElementById('archived');
  var st=document.getElementById('flowSt');
  function setState(s){ if(st){ st.dataset.state=s; st.textContent=I18N[CUR_LANG]['flow.st.'+s]; } }
  var sigLen=0; try{ sigLen=sig.getTotalLength(); }catch(e){ sigLen=300; }
  function sigReset(){ sig.style.transition='none'; sig.style.strokeDasharray=sigLen; sig.style.strokeDashoffset=sigLen; }
  function sigDraw(){ sig.style.transition='stroke-dashoffset 1s ease'; sig.style.strokeDashoffset=0; }

  if(reduce){
    tags.forEach(function(t){t.classList.add('show')}); route.classList.add('show');
    dlines.forEach(function(d){d.classList.add('show')}); sigReset(); sigDraw();
    seal.classList.add('stamped'); arch.classList.add('show'); setState('done');
    return;
  }

  var timers=[];
  function run(){
    timers.forEach(clearTimeout); timers=[];
    tags.forEach(function(t){t.classList.remove('show')}); route.classList.remove('show');
    dlines.forEach(function(d){d.classList.remove('show')}); arch.classList.remove('show');
    seal.classList.remove('stamped'); sigReset(); setState('proc');
    tags.forEach(function(t,i){ timers.push(setTimeout(function(){t.classList.add('show')}, 700+i*450)); });
    timers.push(setTimeout(function(){ route.classList.add('show'); }, 2400));
    dlines.forEach(function(d,i){ timers.push(setTimeout(function(){d.classList.add('show')}, 3200+i*400)); });
    timers.push(setTimeout(function(){ setState('sign'); sigDraw(); }, 4900));
    timers.push(setTimeout(function(){ seal.classList.add('stamped'); }, 5600));
    timers.push(setTimeout(function(){ arch.classList.add('show'); setState('done'); }, 6300));
    timers.push(setTimeout(run, 10500));
  }
  var started=false;
  var ob=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting&&!started){started=true;run();}});},{threshold:.3});
  ob.observe(document.getElementById('flow'));
})();

/* lead form -> Web3Forms. Submissions go to the email tied to the access key (W3F_KEY). */
var W3F_KEY = "9399b7ad-c7aa-4fa4-a634-b60fcc13d666";
var FORM_ENDPOINT = "https://api.web3forms.com/submit";
(function(){
  var form=document.getElementById('leadForm'); if(!form) return;
  var ferr=document.getElementById('ferr');
  function valid(){
    var ok=true;
    form.querySelectorAll('[required]').forEach(function(input){
      var f=input.closest('.field'); var val=(input.value||'').trim(); var bad=!val;
      if(input.type==='email'&&val){ bad=!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val); }
      f.classList.toggle('err',bad); if(bad) ok=false;
    });
    return ok;
  }
  form.querySelectorAll('[required]').forEach(function(input){
    input.addEventListener('input',function(){ if(input.closest('.field').classList.contains('err')) valid(); });
  });
  function success(){ form.style.display='none'; document.getElementById('csuccess').classList.add('show'); }
  form.addEventListener('submit',function(e){
    e.preventDefault(); ferr.classList.remove('show');
    if(!valid()){ var fe=form.querySelector('.field.err'); if(fe) fe.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    var btn=form.querySelector('button[type=submit]'); var label=btn.querySelector('span'); var orig=label?label.textContent:'';
    btn.disabled=true; if(label) label.textContent=I18N[CUR_LANG]['form.sending'];
    var data=new FormData(form); data.append('access_key', W3F_KEY);
    fetch(FORM_ENDPOINT,{method:'POST',body:data,headers:{'Accept':'application/json'}})
      .then(function(r){ if(r.ok){success();} else {ferr.classList.add('show');btn.disabled=false;if(label)label.textContent=orig;} })
      .catch(function(){ ferr.classList.add('show');btn.disabled=false;if(label)label.textContent=orig; });
  });
})();
